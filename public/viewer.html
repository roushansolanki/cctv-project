<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCTV Command Center</title>
    <style>
        :root { --primary: #00ff88; --bg: #0f0f13; --panel: #1c1c24; --text: #ffffff; }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; 
            height: 100vh; box-sizing: border-box; overflow: hidden;
        }
        h2 { margin-top: 0; margin-bottom: 5px; color: var(--primary); font-weight: 600; letter-spacing: 1px; }
        
        .status { margin-bottom: 20px; font-size: 14px; display: flex; align-items: center; gap: 8px; color: #aaa; background: #111; padding: 5px 15px; border-radius: 20px; border: 1px solid #333; }
        .dot { height: 10px; width: 10px; background-color: #ff3333; border-radius: 50%; display: inline-block; }
        .dot.online { background-color: var(--primary); box-shadow: 0 0 8px var(--primary); }

        .video-container { 
            background: #000; border-radius: 12px; padding: 10px; 
            box-shadow: 0 8px 32px rgba(0,255,136,0.05); 
            border: 1px solid rgba(0,255,136,0.2); 
            margin-bottom: 25px; width: 100%; max-width: 900px; 
            display: flex; justify-content: center; position: relative;
        }
        
        /* Video size fixed to never need scrolling */
        video { 
            width: 100%; max-height: 55vh; object-fit: contain; border-radius: 8px; 
        }

        .controls { 
            background: var(--panel); padding: 20px; border-radius: 16px; 
            display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #2a2a35;
            width: 100%; max-width: 800px;
        }
        
        button { 
            background: #2a2a35; color: white; border: 1px solid #3f3f4e; 
            padding: 12px 20px; font-size: 15px; cursor: pointer; border-radius: 10px; 
            transition: all 0.3s ease; display: flex; align-items: center; gap: 10px; font-weight: 500; 
        }
        button:hover { background: #3f3f4e; border-color: var(--primary); transform: translateY(-3px); }
        button:active { transform: translateY(0); }
        
        #recordBtn.recording { 
            background: rgba(255,50,50,0.1); border-color: #ff3333; color: #ff3333; 
            animation: pulse 1.5s infinite; 
        }
        
        @keyframes pulse { 
            0% { box-shadow: 0 0 0 0 rgba(255,50,50,0.4); } 
            70% { box-shadow: 0 0 0 10px rgba(255,50,50,0); } 
            100% { box-shadow: 0 0 0 0 rgba(255,50,50,0); } 
        }
    </style>
</head>
<body>
    <h2>Command Center</h2>
    <div class="status">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">Waiting for Camera...</span>
    </div>

    <div class="video-container">
        <video id="video" autoplay playsinline controls></video>
    </div>
    
    <div class="controls">
        <button onclick="sendCommand('switchCamera')">🔄 Switch Camera</button>
        <button onclick="sendCommand('toggleFlash')">🔦 Toggle Flash</button>
        <button id="recordBtn" onclick="toggleRecording()">🔴 Start Recording</button>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const video = document.getElementById('video');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        let peerConnection;
        const config = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

        function updateStatus(isOnline) {
            if(isOnline) {
                statusDot.classList.add('online');
                statusText.innerText = "Camera Online & Connected";
                statusText.style.color = "var(--primary)";
            } else {
                statusDot.classList.remove('online');
                statusText.innerText = "Camera Disconnected";
                statusText.style.color = "#ff3333";
            }
        }

        function sendCommand(cmd) { socket.emit('remoteCommand', cmd); }

        let mediaRecorder;
        let recordedChunks = [];
        const recordBtn = document.getElementById('recordBtn');
        let isRecording = false;

        function toggleRecording() {
            if (!video.srcObject) return alert("Video feed not active!");
            if (!isRecording) {
                recordedChunks = [];
                mediaRecorder = new MediaRecorder(video.srcObject, { mimeType: 'video/webm' });
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `CCTV_Record_${new Date().getTime()}.webm`;
                    a.click();
                    URL.revokeObjectURL(url);
                };
                mediaRecorder.start();
                recordBtn.innerHTML = "⏹️ Stop Recording";
                recordBtn.classList.add("recording");
                isRecording = true;
            } else {
                mediaRecorder.stop();
                recordBtn.innerHTML = "🔴 Start Recording";
                recordBtn.classList.remove("recording");
                isRecording = false;
            }
        }

        socket.on('broadcaster', () => { socket.emit('watcher'); });

        socket.on('offer', (id, description) => {
            peerConnection = new RTCPeerConnection(config);
            peerConnection.ontrack = event => { 
                video.srcObject = event.streams[0]; 
                updateStatus(true);
            };
            peerConnection.onicecandidate = event => { if (event.candidate) socket.emit('candidate', id, event.candidate); };
            
            // Connection state listener
            peerConnection.onconnectionstatechange = () => {
                if(peerConnection.connectionState === 'disconnected' || peerConnection.connectionState === 'failed') {
                    updateStatus(false);
                }
            };

            peerConnection.setRemoteDescription(description)
            .then(() => peerConnection.createAnswer())
            .then(sdp => peerConnection.setLocalDescription(sdp))
            .then(() => socket.emit('answer', id, peerConnection.localDescription));
        });

        socket.on('candidate', (id, candidate) => { peerConnection.addIceCandidate(new RTCIceCandidate(candidate)); });
        socket.on('disconnectPeer', () => { 
            if(peerConnection) peerConnection.close(); 
            updateStatus(false);
        });
        socket.emit('watcher');
    </script>
</body>
</html>
