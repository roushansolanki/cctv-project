<!DOCTYPE html>
<html>
<head>
    <title>CCTV - Monitor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="background: #222; color: white; text-align: center; font-family: sans-serif;">
    <h2>Live Monitoring feed</h2>
    <video id="video" autoplay playsinline controls style="width: 100%; max-width: 800px; border: 2px solid #00ff00;"></video>
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const video = document.getElementById('video');
        let peerConnection;
        const config = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

        socket.on('broadcaster', () => { socket.emit('watcher'); });

        socket.on('offer', (id, description) => {
            peerConnection = new RTCPeerConnection(config);
            
            peerConnection.ontrack = event => { video.srcObject = event.streams[0]; };
            
            peerConnection.onicecandidate = event => {
                if (event.candidate) socket.emit('candidate', id, event.candidate);
            };

            peerConnection.setRemoteDescription(description)
            .then(() => peerConnection.createAnswer())
            .then(sdp => peerConnection.setLocalDescription(sdp))
            .then(() => socket.emit('answer', id, peerConnection.localDescription));
        });

        socket.on('candidate', (id, candidate) => {
            peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
        });

        socket.on('disconnectPeer', () => {
            if(peerConnection) peerConnection.close();
        });

        socket.emit('watcher');
    </script>
</body>
</html>
