<!DOCTYPE html>
<html>
<head>
    <title>Matrix CCTV Grid</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { background: #050505; color: #0f0; font-family: monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; flex-grow: 1; gap: 5px; padding: 5px; }
        .cam-box { background: #111; border: 1px solid #222; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        video { width: 100%; height: 80%; object-fit: cover; background: #000; }
        .cam-info { padding: 5px; font-size: 11px; background: #1a1a1a; display: flex; justify-content: space-between; }
        .cam-controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; padding: 2px; }
        button { background: #222; color: #0f0; border: 1px solid #333; font-size: 10px; cursor: pointer; padding: 5px 0; }
        button:hover { background: #0f0; color: #000; }
        .alert { position: absolute; top: 10px; left: 10px; color: red; font-weight: bold; background: black; padding: 2px 5px; display: none; border: 1px solid red; }
    </style>
</head>
<body>
    <div style="padding: 10px; border-bottom: 1px solid #222; display: flex; justify-content: space-between;">
        <span>SYSTEM: MATRIX_SURVEILLANCE_V3</span>
        <span id="aiStatus">AI: LOADING...</span>
    </div>
    
    <div class="grid-container" id="grid">
        <div id="slot1" class="cam-box"><span>NO SIGNAL</span></div>
        <div id="slot2" class="cam-box"><span>NO SIGNAL</span></div>
        <div id="slot3" class="cam-box"><span>NO SIGNAL</span></div>
        <div id="slot4" class="cam-box"><span>NO SIGNAL</span></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let aiModel;
        cocoSsd.load().then(m => { aiModel = m; document.getElementById('aiStatus').innerText = "AI: READY"; });

        let connectedCams = {}; 
        let slotIndex = 1;

        socket.emit('getBroadcasters');

        socket.on('broadcaster', (socketId, name) => {
            if (connectedCams[socketId] || slotIndex > 4) return;
            setupCam(socketId, name, slotIndex++);
        });

        function setupCam(socketId, name, slot) {
            const container = document.getElementById('slot' + slot);
            container.innerHTML = `
                <div class="alert" id="alert-${socketId}">PERSON!</div>
                <video id="v-${socketId}" autoplay playsinline></video>
                <div class="cam-info">
                    <span>NAME: ${name}</span>
                    <span id="bat-${socketId}">BAT: --%</span>
                </div>
                <div class="cam-controls">
                    <button onclick="cmd('${socketId}','switchCamera')">CAM</button>
                    <button onclick="cmd('${socketId}','toggleFlash')">LIGHT</button>
                    <button onclick="cmd('${socketId}','toggleStealth')">HIDE</button>
                    <button onpointerdown="startTalk('${socketId}')" onpointerup="stopTalk()">MIC</button>
                </div>
            `;
            connectedCams[socketId] = { pc: new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] }) };
            socket.emit('watcher', socketId);
            
            const pc = connectedCams[socketId].pc;
            pc.ontrack = e => { 
                const v = document.getElementById('v-' + socketId);
                v.srcObject = e.streams[0];
                setInterval(() => runAI(v, socketId), 1000);
            };
            socket.on('offer', (id, desc) => {
                if(id !== socketId) return;
                pc.setRemoteDescription(desc).then(() => pc.createAnswer()).then(d => pc.setLocalDescription(d)).then(() => socket.emit('answer', id, pc.localDescription));
            });
            pc.onicecandidate = e => e.candidate && socket.emit('candidate', socketId, e.candidate);
        }

        function runAI(v, sid) {
            if(!aiModel || !v.videoWidth) return;
            aiModel.detect(v).then(p => {
                const person = p.some(x => x.class === 'person');
                document.getElementById('alert-' + sid).style.display = person ? 'block' : 'none';
            });
        }

        function cmd(sid, c) { socket.emit('remoteCommand', sid, c); }
        
        let recorder;
        async function startTalk(sid) {
            const s = await navigator.mediaDevices.getUserMedia({audio:true});
            recorder = new MediaRecorder(s);
            let chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => socket.emit('voiceCommand', sid, new Blob(chunks));
            recorder.start();
        }
        function stopTalk() { if(recorder) recorder.stop(); }

        socket.on('batteryInfo', (sid, info) => { if(document.getElementById('bat-'+sid)) document.getElementById('bat-'+sid).innerText = "BAT: "+info.level+"%"; });
        socket.on('disconnectPeer', sid => { location.reload(); }); // Simple refresh on disconnect
    </script>
</body>
</html>
