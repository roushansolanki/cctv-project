<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCTV Command Center</title>
    <style>
        :root { --primary: #00ff88; --bg: #0f0f13; --panel: #1c1c24; --text: #ffffff; }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; 
            height: 100vh; box-sizing: border-box; overflow: hidden; transition: box-shadow 0.2s;
        }
        h2 { margin-top: 0; margin-bottom: 5px; color: var(--primary); font-weight: 600; letter-spacing: 1px; }
        
        .status { margin-bottom: 20px; font-size: 14px; display: flex; align-items: center; gap: 8px; color: #aaa; background: #111; padding: 5px 15px; border-radius: 20px; border: 1px solid #333; }
        .dot { height: 10px; width: 10px; background-color: #ff3333; border-radius: 50%; display: inline-block; }
        .dot.online { background-color: var(--primary); box-shadow: 0 0 8px var(--primary); }

        .video-container { 
            background: #000; border-radius: 12px; padding: 10px; 
            box-shadow: 0 8px 32px rgba(0,255,136,0.05); 
            border: 1px solid rgba(0,255,136,0.2); 
            margin-bottom: 25px; width: 100%; max-width: 900px; 
            display: flex; justify-content: center; position: relative;
        }
        
        video { width: 100%; max-height: 55vh; object-fit: contain; border-radius: 8px; }

        .controls { 
            background: var(--panel); padding: 20px; border-radius: 16px; 
            display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #2a2a35;
            width: 100%; max-width: 800px;
        }
        
        button { 
            background: #2a2a35; color: white; border: 1px solid #3f3f4e; 
            padding: 12px 15px; font-size: 14px; cursor: pointer; border-radius: 8px; 
            transition: all 0.3s ease; display: flex; align-items: center; gap: 8px; font-weight: 500; 
        }
        button:hover { background: #3f3f4e; border-color: var(--primary); transform: translateY(-2px); }
        
        #recordBtn.recording { background: rgba(255,50,50,0.1); border-color: #ff3333; color: #ff3333; animation: pulse 1.5s infinite; }
        #motionBtn.active { background: rgba(255,165,0,0.2); border-color: orange; color: orange; }
        #stealthBtn.active { background: rgba(150,150,150,0.2); border-color: gray; color: gray; }

        @keyframes pulse { 
            0% { box-shadow: 0 0 0 0 rgba(255,50,50,0.4); } 
            70% { box-shadow: 0 0 0 10px rgba(255,50,50,0); } 
            100% { box-shadow: 0 0 0 0 rgba(255,50,50,0); } 
        }
    </style>
</head>
<body>
    <h2>Command Center</h2>
    <div class="status">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">Waiting for Camera...</span>
    </div>

    <div class="video-container">
        <video id="video" autoplay playsinline controls></video>
    </div>
    
    <div class="controls">
        <button onclick="sendCommand('switchCamera')">🔄 Switch F/B</button>
        <button onclick="sendCommand('toggleFlash')">🔦 Flashlight</button>
        <button id="stealthBtn" onclick="toggleStealth()">🕶️ Stealth Mode</button>
        <button id="motionBtn" onclick="toggleMotion()">🚨 Alarm: OFF</button>
        <button id="recordBtn" onclick="toggleRecording()">🔴 Record</button>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const video = document.getElementById('video');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        let peerConnection;
        const config = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

        function updateStatus(isOnline) {
            if(isOnline) {
                statusDot.classList.add('online');
                statusText.innerText = "Camera Online & Connected";
                statusText.style.color = "var(--primary)";
            } else {
                statusDot.classList.remove('online');
                statusText.innerText = "Camera Disconnected";
                statusText.style.color = "#ff3333";
            }
        }

        function sendCommand(cmd) { socket.emit('remoteCommand', cmd); }

        // --- STEALTH MODE LOGIC ---
        let isStealth = false;
        function toggleStealth() {
            isStealth = !isStealth;
            sendCommand('toggleStealth');
            const btn = document.getElementById('stealthBtn');
            btn.classList.toggle('active', isStealth);
            btn.innerText = isStealth ? "🕶️ Stealth: ON" : "🕶️ Stealth Mode";
        }

        // --- MOTION DETECTION LOGIC ---
        let motionEnabled = false;
        let motionInterval;
        let previousFrameData = null;
        const motionCanvas = document.createElement('canvas');
        const mCtx = motionCanvas.getContext('2d', { willReadFrequently: true });
        
        // Audio Synthesizer for Beep Sound
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playBeep() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.value = 1200; // High pitch alarm
            gain.gain.value = 0.1;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1); // Short beep
        }

        function toggleMotion() {
            motionEnabled = !motionEnabled;
            const btn = document.getElementById('motionBtn');
            if (motionEnabled) {
                btn.classList.add('active');
                btn.innerText = "🚨 Alarm: ON";
                // Reduce resolution for faster processing
                motionCanvas.width = video.videoWidth / 4;
                motionCanvas.height = video.videoHeight / 4;
                motionInterval = setInterval(checkMotion, 300); // Check every 300ms
                if(audioCtx.state === 'suspended') audioCtx.resume(); // Unlock audio
            } else {
                btn.classList.remove('active');
                btn.innerText = "🚨 Alarm: OFF";
                clearInterval(motionInterval);
                previousFrameData = null;
            }
        }

        function checkMotion() {
            if (!video.videoWidth || !motionEnabled) return;
            mCtx.drawImage(video, 0, 0, motionCanvas.width, motionCanvas.height);
            const currentFrame = mCtx.getImageData(0, 0, motionCanvas.width, motionCanvas.height);
            
            if (previousFrameData) {
                let diff = 0;
                for (let i = 0; i < currentFrame.data.length; i += 4) {
                    const r = Math.abs(currentFrame.data[i] - previousFrameData[i]);
                    const g = Math.abs(currentFrame.data[i+1] - previousFrameData[i+1]);
                    const b = Math.abs(currentFrame.data[i+2] - previousFrameData[i+2]);
                    if (r + g + b > 120) diff++; // Pixel difference threshold
                }
                const changedPixels = (diff / (currentFrame.data.length / 4)) * 100;
                if (changedPixels > 4) { // If more than 4% of screen changes
                    triggerAlarm();
                }
            }
            previousFrameData = currentFrame.data;
        }

        function triggerAlarm() {
            playBeep();
            document.body.style.boxShadow = "inset 0 0 150px rgba(255,0,0,0.6)";
            setTimeout(() => { document.body.style.boxShadow = "none"; }, 150);
        }

        // --- RECORDING LOGIC ---
        let mediaRecorder;
        let recordedChunks = [];
        let isRecording = false;
        function toggleRecording() {
            if (!video.srcObject) return alert("Video feed not active!");
            const recordBtn = document.getElementById('recordBtn');
            if (!isRecording) {
                recordedChunks = [];
                mediaRecorder = new MediaRecorder(video.srcObject, { mimeType: 'video/webm' });
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `CCTV_Record_${new Date().getTime()}.webm`;
                    a.click();
                };
                mediaRecorder.start();
                recordBtn.innerHTML = "⏹️ Stop";
                recordBtn.classList.add("recording");
                isRecording = true;
            } else {
                mediaRecorder.stop();
                recordBtn.innerHTML = "🔴 Record";
                recordBtn.classList.remove("recording");
                isRecording = false;
            }
        }

        // --- WEBRTC CONNECTION ---
        socket.on('broadcaster', () => { socket.emit('watcher'); });
        socket.on('offer', (id, description) => {
            peerConnection = new RTCPeerConnection(config);
            peerConnection.ontrack = event => { video.srcObject = event.streams[0]; updateStatus(true); };
            peerConnection.onicecandidate = event => { if (event.candidate) socket.emit('candidate', id, event.candidate); };
            peerConnection.onconnectionstatechange = () => {
                if(peerConnection.connectionState === 'disconnected' || peerConnection.connectionState === 'failed') updateStatus(false);
            };
            peerConnection.setRemoteDescription(description)
            .then(() => peerConnection.createAnswer())
            .then(sdp => peerConnection.setLocalDescription(sdp))
            .then(() => socket.emit('answer', id, peerConnection.localDescription));
        });
        socket.on('candidate', (id, candidate) => { peerConnection.addIceCandidate(new RTCIceCandidate(candidate)); });
        socket.on('disconnectPeer', () => { if(peerConnection) peerConnection.close(); updateStatus(false); });
        socket.emit('watcher');
    </script>
</body>
</html>
