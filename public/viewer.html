<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCTV Secure Command Center</title>
    <style>
        :root { --primary: #00ff88; --bg: #0f0f13; --panel: #1c1c24; --text: #ffffff; --danger: #ff3333; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .auth-bar { background: var(--panel); padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; gap: 10px; width: 100%; max-width: 900px; border: 1px solid #333; }
        input { background: #111; color: white; border: 1px solid #333; padding: 8px 15px; border-radius: 6px; flex-grow: 1; outline: none; }
        .connect-btn { background: var(--primary); color: black; font-weight: bold; border: none; padding: 8px 20px; border-radius: 6px; cursor: pointer; }

        .top-panel { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 900px;}
        .info-box { font-size: 13px; display: flex; align-items: center; gap: 8px; color: #aaa; background: #111; padding: 6px 15px; border-radius: 20px; border: 1px solid #333; }
        .dot { height: 10px; width: 10px; background-color: var(--danger); border-radius: 50%; display: inline-block; }
        .dot.online { background-color: var(--primary); box-shadow: 0 0 8px var(--primary); }
        
        .video-container { background: #000; border-radius: 12px; padding: 10px; box-shadow: 0 8px 32px rgba(0,255,136,0.05); border: 1px solid rgba(0,255,136,0.2); margin-bottom: 15px; width: 100%; max-width: 900px; display: flex; justify-content: center; position: relative; }
        video { width: 100%; max-height: 50vh; object-fit: contain; border-radius: 8px; transition: filter 0.3s; }
        .night-vision { filter: sepia(1) hue-rotate(80deg) saturate(3) brightness(1.2) contrast(1.3); }

        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; width: 100%; max-width: 900px; }
        .control-group { background: var(--panel); padding: 15px; border-radius: 12px; border: 1px solid #2a2a35; }
        .control-group h3 { margin: 0 0 10px 0; font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .btn-grid { display: flex; flex-wrap: wrap; gap: 8px; }
        
        button { background: #2a2a35; color: white; border: 1px solid #3f3f4e; padding: 8px 12px; font-size: 12px; cursor: pointer; border-radius: 8px; display: flex; align-items: center; gap: 5px; flex-grow: 1; justify-content: center; }
        button.active { background: rgba(0,255,136,0.1); border-color: var(--primary); color: var(--primary); }
        .danger-btn.active { background: var(--danger); color: white; border-color: var(--danger); }
    </style>
</head>
<body>
    <div class="auth-bar">
        <input type="text" id="targetCamId" placeholder="Enter Target Camera ID (e.g., Cam_123)">
        <button class="connect-btn" onclick="connectToCamera()">Connect</button>
    </div>

    <div class="top-panel">
        <div class="info-box"><span class="dot" id="statusDot"></span><span id="statusText">Disconnected</span></div>
        <div class="info-box" id="batteryStatus">🔋 --%</div>
        <div class="info-box" id="gpsStatus">📍 Location: Waiting...</div>
    </div>

    <div class="video-container">
        <video id="video" autoplay playsinline controls crossorigin="anonymous"></video>
    </div>
    
    <div class="dashboard-grid">
        <div class="control-group">
            <h3>Camera Optics</h3>
            <div class="btn-grid">
                <button onclick="sendCommand('switchCamera')">🔄 Flip</button>
                <button id="nvBtn" onclick="toggleNightVision()">🌙 NV Filter</button>
                <button onclick="sendCommand('toggleFlash')">🔦 Flashlight</button>
            </div>
        </div>

        <div class="control-group">
            <h3>Active Defense</h3>
            <div class="btn-grid">
                <button id="stealthBtn" onclick="toggleStealth()">🕶️ Stealth</button>
                <button id="sirenBtn" class="danger-btn" onclick="toggleSiren()">📢 Remote Siren</button>
                <button id="walkieBtn" onpointerdown="startTalk(event)" onpointerup="stopTalk(event)">🎙️ Hold to Talk</button>
            </div>
        </div>

        <div class="control-group">
            <h3>Recording</h3>
            <div class="btn-grid">
                <button id="recordBtn" class="danger-btn" onclick="toggleRecording()">🔴 Manual REC</button>
            </div>
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io({ auth: { token: "MySuperSecretCCTV2026" } });
        let currentTargetId = null;
        let peerConnection; 
        const video = document.getElementById('video');
        const statusDot = document.getElementById('statusDot'), statusText = document.getElementById('statusText');
        
        // APNA PRIVATE TURN SERVER YAHAN DAALEIN
        const config = { 
            iceServers: [
                { urls: "stun:stun.l.google.com:19302" },
                { urls: "stun:stun.relay.metered.ca:80" },
                { urls: "turn:global.relay.metered.ca:80", username: "37b362bda868077f80104cde", credential: "IqAKxJUtcoBzrGpb" },
                { urls: "turn:global.relay.metered.ca:80?transport=tcp", username: "37b362bda868077f80104cde", credential: "IqAKxJUtcoBzrGpb" },
                { urls: "turn:global.relay.metered.ca:443", username: "37b362bda868077f80104cde", credential: "IqAKxJUtcoBzrGpb" },
                { urls: "turns:global.relay.metered.ca:443?transport=tcp", username: "37b362bda868077f80104cde", credential: "IqAKxJUtcoBzrGpb" }
            ] 
        };

        socket.on('systemError', (msg) => { alert("System Alert: " + msg); updateStatus(false); });
        
        function connectToCamera() {
            const camId = document.getElementById('targetCamId').value.trim();
            if(!camId) return alert("Enter a Camera ID");
            if (peerConnection) { peerConnection.close(); peerConnection = null; }
            currentTargetId = camId;
            statusText.innerText = "Connecting...";
            socket.emit('watch_camera', currentTargetId);
        }

        function updateStatus(isOnline) {
            if(isOnline) { statusDot.classList.add('online'); statusText.innerText = "Connected to " + currentTargetId; statusText.style.color = "var(--primary)"; } 
            else { statusDot.classList.remove('online'); statusText.innerText = "Disconnected"; statusText.style.color = "var(--danger)"; }
        }

        socket.on('telemetryData', (data) => {
            if(data.battery) document.getElementById('batteryStatus').innerText = `🔋 ${data.battery.level}% ${data.battery.charging ? '⚡' : ''}`;
            if(data.gps && data.gps.lat) {
                const speed = Math.round(data.gps.speed * 3.6); 
                document.getElementById('gpsStatus').innerHTML = `📍 <a href="https://maps.google.com/?q=${data.gps.lat},${data.gps.lng}" target="_blank" style="color:var(--primary)">Map</a> | 🚗 ${speed} km/h`; 
            }
        });

        function sendCommand(cmd) { if(!currentTargetId) return alert("Not connected to any camera"); socket.emit('remoteCommand', currentTargetId, cmd); }

        let isStealth = false; function toggleStealth() { isStealth = !isStealth; sendCommand('toggleStealth'); document.getElementById('stealthBtn').classList.toggle('active', isStealth); }
        let isNightVision = false; function toggleNightVision() { isNightVision = !isNightVision; isNightVision ? video.classList.add('night-vision') : video.classList.remove('night-vision'); document.getElementById('nvBtn').classList.toggle('active', isNightVision); }
        let isSiren = false; function toggleSiren() { isSiren = !isSiren; sendCommand('toggleSiren'); document.getElementById('sirenBtn').classList.toggle('active', isSiren); }

        let talkRecorder, talkChunks = [], talkStream;
        async function startTalk(e) {
            e.preventDefault(); if(!currentTargetId) return alert("Connect to camera first!");
            try {
                if(!talkStream) talkStream = await navigator.mediaDevices.getUserMedia({audio: true});
                talkRecorder = new MediaRecorder(talkStream); talkChunks = [];
                talkRecorder.ondataavailable = e => { if(e.data.size > 0) talkChunks.push(e.data); };
                talkRecorder.onstop = () => { socket.emit('voiceCommand', currentTargetId, new Blob(talkChunks, { type: 'audio/webm' })); }; 
                talkRecorder.start(); document.getElementById('walkieBtn').classList.add('active');
            } catch(e) { alert("Mic permission denied!"); }
        }
        function stopTalk(e) { e.preventDefault(); if(talkRecorder && talkRecorder.state !== 'inactive') { talkRecorder.stop(); document.getElementById('walkieBtn').classList.remove('active'); } }

        let mediaRecorder, recordedChunks = [], isRecording = false;
        function toggleRecording() {
            if (!video.srcObject) return alert("No video stream to record!");
            const recordBtn = document.getElementById('recordBtn');
            if (!isRecording) {
                recordedChunks = [];
                mediaRecorder = new MediaRecorder(video.srcObject, { mimeType: 'video/webm' });
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(recordedChunks, { type: 'video/webm' })); a.download = `CCTV_${currentTargetId}_${new Date().getTime()}.webm`; a.click();
                };
                mediaRecorder.start(); recordBtn.innerHTML = "⏹️ Stop REC"; recordBtn.classList.add("active"); isRecording = true;
            } else {
                mediaRecorder.stop(); recordBtn.innerHTML = "🔴 Manual REC"; recordBtn.classList.remove("active"); isRecording = false;
            }
        }

        socket.on('watcher', id => { });
        socket.on('offer', (id, description) => {
            peerConnection = new RTCPeerConnection(config);
            peerConnection.ontrack = event => { video.srcObject = event.streams[0]; updateStatus(true); };
            peerConnection.onicecandidate = event => { if (event.candidate) socket.emit('candidate', id, event.candidate); };
            peerConnection.onconnectionstatechange = () => { if(peerConnection.connectionState === 'disconnected' || peerConnection.connectionState === 'failed') updateStatus(false); };
            peerConnection.setRemoteDescription(description).then(() => peerConnection.createAnswer()).then(sdp => peerConnection.setLocalDescription(sdp)).then(() => socket.emit('answer', id, peerConnection.localDescription));
        });
        socket.on('candidate', (id, candidate) => { peerConnection.addIceCandidate(new RTCIceCandidate(candidate)); });
        socket.on('disconnectPeer', () => { if(peerConnection) peerConnection.close(); updateStatus(false); });
    </script>
</body>
</html>
