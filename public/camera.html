<!DOCTYPE html>
<html>
<head>
    <title>CCTV - Camera Broadcaster</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="background: black; color: white; text-align: center; font-family: sans-serif;">
    <h2>CCTV Camera (Live)</h2>
    <video id="video" autoplay muted playsinline style="width: 100%; max-width: 600px; border: 2px solid red;"></video>
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const video = document.getElementById('video');
        let peerConnections = {};
        
        // Google's free STUN server for connection setup
        const config = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

        // Get Camera and Mic access
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: true })
        .then(stream => {
            video.srcObject = stream;
            socket.emit('broadcaster');

            socket.on('watcher', id => {
                const peerConnection = new RTCPeerConnection(config);
                peerConnections[id] = peerConnection;

                stream.getTracks().forEach(track => peerConnection.addTrack(track, stream));

                peerConnection.onicecandidate = event => {
                    if (event.candidate) socket.emit('candidate', id, event.candidate);
                };

                peerConnection.createOffer()
                .then(sdp => peerConnection.setLocalDescription(sdp))
                .then(() => socket.emit('offer', id, peerConnection.localDescription));
            });

            socket.on('answer', (id, description) => {
                peerConnections[id].setRemoteDescription(description);
            });

            socket.on('candidate', (id, candidate) => {
                peerConnections[id].addIceCandidate(new RTCIceCandidate(candidate));
            });

            socket.on('disconnectPeer', id => {
                if(peerConnections[id]) { peerConnections[id].close(); delete peerConnections[id]; }
            });
        })
        .catch(error => console.error("Camera access denied!", error));
    </script>
</body>
</html>
