<!DOCTYPE html>
<html>
<head>
    <title>CCTV Broadcaster</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
</head>
<body style="background: black; color: white; text-align: center; font-family: sans-serif; transition: 0.5s;">
    <div id="ui">
        <h2 id="camName">Connecting...</h2>
        <video id="video" autoplay muted playsinline style="width: 90%; border: 2px solid red; border-radius: 10px;"></video>
        <p>Status: <span id="status">Waiting...</span></p>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const video = document.getElementById('video');
        const camNameDisp = document.getElementById('camName');
        let myId = prompt("Enter Camera Name (e.g. Hall, Kitchen, Gate):") || "Phone-" + Math.floor(Math.random()*100);
        camNameDisp.innerText = "Camera: " + myId;

        let peerConnections = {};
        const config = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };
        let currentStream, isFront = false, flashOn = false, wakeLock = null;

        // Keep Screen Awake
        async function requestWakeLock() {
            try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
        }
        requestWakeLock();

        async function init() {
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: true });
                video.srcObject = currentStream;
                socket.emit('broadcaster', myId);
                document.getElementById('status').innerText = "Live & Ready";
            } catch (e) { alert("Camera Error: " + e); }
        }

        init();

        // Battery & GPS (Background focus)
        setInterval(() => {
            if (navigator.getBattery) navigator.getBattery().then(b => socket.emit('batteryInfo', { level: Math.round(b.level * 100), charging: b.charging }));
            if (navigator.geolocation) navigator.geolocation.getCurrentPosition(p => socket.emit('gpsInfo', { lat: p.coords.latitude, lng: p.coords.longitude }), null, {enableHighAccuracy:true});
        }, 10000);

        socket.on('watcher', id => {
            const pc = new RTCPeerConnection(config);
            peerConnections[id] = pc;
            currentStream.getTracks().forEach(t => pc.addTrack(t, currentStream));
            pc.onicecandidate = e => e.candidate && socket.emit('candidate', id, e.candidate);
            pc.createOffer().then(d => pc.setLocalDescription(d)).then(() => socket.emit('offer', id, pc.localDescription));
        });

        socket.on('answer', (id, desc) => peerConnections[id].setRemoteDescription(desc));
        socket.on('candidate', (id, cand) => peerConnections[id].addIceCandidate(new RTCIceCandidate(cand)));
        socket.on('voiceCommand', (buf) => { new Audio(URL.createObjectURL(new Blob([buf], {type:'audio/webm'}))).play(); });

        socket.on('remoteCommand', async (cmd) => {
            if (cmd === 'switchCamera') { isFront = !isFront; init(); }
            else if (cmd === 'toggleFlash') {
                const track = currentStream.getVideoTracks()[0];
                const caps = track.getCapabilities();
                if(caps.torch) track.applyConstraints({advanced: [{torch: (flashOn = !flashOn)}]});
            }
            else if (cmd === 'toggleStealth') {
                document.getElementById('ui').style.opacity = document.getElementById('ui').style.opacity == "0" ? "1" : "0";
                document.body.style.background = "black";
            }
        });
    </script>
</body>
</html>
