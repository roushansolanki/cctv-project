<!DOCTYPE html>
<html>
<head>
    <title>CCTV - Broadcaster</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="background: black; color: white; text-align: center; font-family: sans-serif; transition: all 0.3s;">
    <h2 id="titleText">CCTV Device (Live)</h2>
    <p id="subText">Controlled remotely from viewer...</p>
    <video id="video" autoplay muted playsinline style="width: 100%; max-width: 600px; border: 2px solid red; transition: opacity 0.3s;"></video>
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const video = document.getElementById('video');
        const titleText = document.getElementById('titleText');
        const subText = document.getElementById('subText');
        
        let peerConnections = {};
        const config = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };
        let currentStream;
        let isFront = false;
        let flashOn = false;
        let stealthMode = false;
        let currentZoom = 1;

        // Battery Status Sender
        if (navigator.getBattery) {
            navigator.getBattery().then(battery => {
                const sendBattery = () => {
                    socket.emit('batteryInfo', { level: Math.round(battery.level * 100), charging: battery.charging });
                };
                sendBattery(); // Send on load
                setInterval(sendBattery, 10000); // Update every 10 seconds
            });
        }

        async function startCamera() {
            if (currentStream) currentStream.getTracks().forEach(track => track.stop());
            currentZoom = 1; // reset zoom
            const constraints = { video: { facingMode: isFront ? "user" : "environment" }, audio: true };
            try {
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = currentStream;
                for (let id in peerConnections) {
                    let sender = peerConnections[id].getSenders().find(s => s.track.kind === 'video');
                    let newVideoTrack = currentStream.getVideoTracks()[0];
                    if (sender) sender.replaceTrack(newVideoTrack);
                }
            } catch (error) { console.error("Camera error:", error); }
        }

        startCamera().then(() => socket.emit('broadcaster'));

        socket.on('watcher', id => {
            const peerConnection = new RTCPeerConnection(config);
            peerConnections[id] = peerConnection;
            currentStream.getTracks().forEach(track => peerConnection.addTrack(track, currentStream));
            peerConnection.onicecandidate = event => { if (event.candidate) socket.emit('candidate', id, event.candidate); };
            peerConnection.createOffer()
            .then(sdp => peerConnection.setLocalDescription(sdp))
            .then(() => socket.emit('offer', id, peerConnection.localDescription));
        });

        socket.on('answer', (id, description) => { peerConnections[id].setRemoteDescription(description); });
        socket.on('candidate', (id, candidate) => { peerConnections[id].addIceCandidate(new RTCIceCandidate(candidate)); });
        socket.on('disconnectPeer', id => { if(peerConnections[id]) { peerConnections[id].close(); delete peerConnections[id]; } });

        // Audio Context for Siren
        let sirenInterval;
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSirenSound() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(800, audioCtx.currentTime + 0.5);
            gain.gain.value = 1; // MAX Volume
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        socket.on('remoteCommand', async (cmd) => {
            if (cmd === 'switchCamera') {
                isFront = !isFront;
                flashOn = false;
                await startCamera();
            } 
            else if (cmd === 'toggleFlash') {
                let track = currentStream.getVideoTracks()[0];
                let caps = track.getCapabilities();
                if (caps.torch) {
                    flashOn = !flashOn;
                    track.applyConstraints({ advanced: [{ torch: flashOn }] });
                } else { socket.emit('viewerMessage', 'Flashlight not supported on this camera.'); }
            }
            else if (cmd === 'toggleStealth') {
                stealthMode = !stealthMode;
                if(stealthMode) {
                    document.body.style.background = "black";
                    titleText.style.color = "black"; 
                    subText.style.color = "black";
                    video.style.opacity = "0.01"; 
                    video.style.border = "none";
                } else {
                    titleText.style.color = "white";
                    subText.style.color = "white";
                    video.style.opacity = "1";
                    video.style.border = "2px solid red";
                }
            }
            else if (cmd === 'zoomIn' || cmd === 'zoomOut') {
                let track = currentStream.getVideoTracks()[0];
                let caps = track.getCapabilities();
                if (caps.zoom) {
                    let step = (caps.zoom.max - caps.zoom.min) / 5;
                    currentZoom = cmd === 'zoomIn' ? Math.min(caps.zoom.max, currentZoom + step) : Math.max(caps.zoom.min, currentZoom - step);
                    track.applyConstraints({ advanced: [{ zoom: currentZoom }] });
                } else { socket.emit('viewerMessage', 'Remote Zoom is not supported by this phone.'); }
            }
            else if (cmd === 'toggleSiren') {
                if (sirenInterval) {
                    clearInterval(sirenInterval);
                    sirenInterval = null;
                } else {
                    sirenInterval = setInterval(playSirenSound, 600);
                    playSirenSound();
                }
            }
        });
    </script>
</body>
</html>
